<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Counter Tool</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f4f4f4;
  margin: 0;
}

.container {
  max-width: 800px;
  margin: auto;
  padding: 20px;
  background: white;
}

textarea {
  width: 100%;
  height: 150px;
  padding: 10px;
  margin-top: 10px;
}

.result {
  margin-top: 15px;
  font-size: 18px;
  font-weight: bold;
}

.ad {
  margin: 20px 0;
}
</style>

</head>

<body>

<div class="container">

<h1>Word Counter Tool</h1>
<p>Type or paste your text below:</p>

<!-- 🔝 TOP BANNER AD (728x90) -->
<div class="ad">
<script>
  atOptions = {
    'key' : 'aae3bbca5f2a39c6ef6322fdb513717b',
    'format' : 'iframe',
    'height' : 90,
    'width' : 728,
    'params' : {}
  };
</script>
<script src="https://www.highperformanceformat.com/aae3bbca5f2a39c6ef6322fdb513717b/invoke.js"></script>
</div>

<textarea id="text" oninput="countWords()"></textarea>

<div class="result">
Words: <span id="words">0</span> |
Characters: <span id="chars">0</span>
</div>

<!-- 📌 NATIVE AD (MIDDLE) -->
<div class="ad">
<script async="async" data-cfasync="false" src="https://pl29127659.profitablecpmratenetwork.com/7b390bcdbc7753b230e55c786f1d95ed/invoke.js"></script>
<div id="container-7b390bcdbc7753b230e55c786f1d95ed"></div>
</div>

</div>

<script>
function countWords() {
  let text = document.getElementById("text").value;

  let words = text.trim().split(/\s+/).filter(word => word.length > 0);
  
  document.getElementById("words").innerText = words.length;
  document.getElementById("chars").innerText = text.length;
}
</script>

</body>
</html>
